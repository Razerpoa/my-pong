name: Build and Release (Windows Cross-Compile)

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install MinGW Cross-Compiler
        run: |
          sudo apt-get update
          sudo apt-get install -y mingw-w64 wget unzip

      - name: Download and Setup Raylib Windows Binaries
        run: |
          # Download the official MinGW release of Raylib
          wget https://github.com/raysan5/raylib/releases/download/6.0/raylib-6.0_win64_mingw-w64.zip
          unzip raylib-6.0_win64_mingw-w64.zip
          
          # Recreate expected structure for your build command
          mkdir -p include lib
          cp -r raylib-6.0_win64_mingw-w64/include/* ./include/
          cp -r raylib-6.0_win64_mingw-w64/lib/* ./lib/

      - name: Build Windows Binary
        run: |
          mkdir -p build
          # Using x86_64-w64-mingw32-g++ instead of standard g++ to cross-compile
          x86_64-w64-mingw32-g++ main.cpp -o build/pong.exe \
            -I ./include -L ./lib \
            -lraylib -lopengl32 -lgdi32 -lwinmm -mwindows

      - name: Package Release
        run: |
          cd build
          zip -r pong-windows-mingw32.zip pong.exe

      - name: Create Release and Upload Asset
        uses: softprops/action-gh-release@v2
        with:
          files: build/pong-windows.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
